services:
  app:
    image: ghcr.io/${GHCR_OWNER}/${IMAGE_NAME}:${IMAGE_TAG}
    container_name: pulsereview-app
    restart: unless-stopped
    env_file:
      - /opt/pulsereview/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - pulsereview-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  pulsereview-net:
    driver: bridge
